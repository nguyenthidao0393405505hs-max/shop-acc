<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop túi mù(ff)</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#2b6cff;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
margin-bottom:90px;
}

.page{display:none;}
.active{display:block;}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#2b6cff;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
}

input{
width:95%;
padding:10px;
margin-bottom:10px;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #ccc;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">
SHOP TÚI MÙ TANDANG(FF)
</div>

<div class="container">

<div id="home" class="page active">
<div class="card">
Trang chủ shop
</div>
</div>

<div id="shop" class="page">

<div class="card">Túi mù 19k <button onclick="buy(19000)">Mua</button></div>
<div class="card">Túi mù 70k <button onclick="buy(70000)">Mua</button></div>
<div class="card">Túi mù 100k <button onclick="buy(100000)">Mua</button></div>

</div>

<div id="account" class="page">

<div id="loginBox" class="card">

<h3>Đăng nhập</h3>

<input id="loginUser" placeholder="Tài khoản">
<input id="loginPass" type="password" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

</div>

<div id="registerBox" class="card">

<h3>Đăng ký</h3>

<input id="regUser" placeholder="Tài khoản">
<input id="regPass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

</div>

<div class="card">
Số dư: <span id="money">0</span>
</div>

<div id="userPanel" class="card hidden">

<h3 id="helloUser"></h3>

<button onclick="logout()">Đăng xuất</button>

</div>

<div class="card">

<h3>Admin</h3>

<input id="adminEmail" placeholder="gmail admin">

<button onclick="adminLogin()">Đăng nhập admin</button>

</div>

<div id="adminPanel" class="hidden">

<div class="card">

<h3>Thêm tiền</h3>

<input id="userAdd" placeholder="username hoặc all">
<input id="moneyAdd" placeholder="số tiền">

<button onclick="addMoney()">Thêm tiền</button>

</div>

</div>

</div>

<div id="accPage" class="page">

<div class="card">

<h3>ACC đã mua</h3>

<div id="accList"></div>

</div>

</div>

</div>

<div class="footer">

<button onclick="showPage('home')">Trang chủ</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('account')">Tài khoản</button>
<button onclick="showPage('accPage')">ACC</button>

</div>

<script>

let adminGmail="nguyentandang2472010@gmail.com"

function getUsers(){
return JSON.parse(localStorage.getItem("users"))||[]
}

function saveUsers(users){
localStorage.setItem("users",JSON.stringify(users))
}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function register(){

let users=getUsers()

users.push({
user:regUser.value,
pass:regPass.value,
money:0,
acc:[]
})

saveUsers(users)

alert("Đăng ký thành công")

}

function login(){

let users=getUsers()

let found=users.find(a=>a.user==loginUser.value && a.pass==loginPass.value)

if(!found){

alert("Sai tài khoản")

return

}

localStorage.setItem("login",found.user)

loadUser()

}

function logout(){

localStorage.removeItem("login")

location.reload()

}

function loadUser(){

let login=localStorage.getItem("login")

if(!login) return

let users=getUsers()

let acc=users.find(a=>a.user==login)

if(!acc) return

money.innerText=acc.money

helloUser.innerText="Xin chào "+acc.user

userPanel.classList.remove("hidden")

loginBox.style.display="none"
registerBox.style.display="none"

}

function adminLogin(){

if(adminEmail.value.trim()==adminGmail){

adminPanel.classList.remove("hidden")

alert("Admin login thành công")

}else{

alert("Sai gmail admin")

}

}

function addMoney(){

let users=getUsers()

let username=userAdd.value.trim()

let moneyValue=parseInt(moneyAdd.value)

if(username=="all"){

users.forEach(u=>u.money+=moneyValue)

saveUsers(users)

alert("Đã thêm tiền cho tất cả")

return

}

let acc=users.find(a=>a.user==username)

if(!acc){

alert("Không tìm thấy user")

return

}

acc.money+=moneyValue

saveUsers(users)

let login=localStorage.getItem("login")

if(login==username){

money.innerText=acc.money

}

alert("Đã thêm tiền cho "+username)

}

function buy(price){

let login=localStorage.getItem("login")

if(!login){

alert("Đăng nhập trước")

return

}

let users=getUsers()

let acc=users.find(a=>a.user==login)

if(acc.money<price){

alert("Không đủ tiền")

return

}

acc.money-=price

acc.acc.push("ACC random FF")

saveUsers(users)

money.innerText=acc.money

loadAcc()

alert("Mua thành công")

}

function loadAcc(){

let login=localStorage.getItem("login")

if(!login) return

let users=getUsers()

let acc=users.find(a=>a.user==login)

accList.innerHTML=""

acc.acc.forEach(a=>{

accList.innerHTML+=`<div class="card">${a}</div>`

})

}

loadUser()

</script>

</body>
  </html>
